<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Suvarna Chanderi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory:  #f9f4ec;
    --cream:  #f2e9d8;
    --gold:   #c8972a;
    --gold2:  #e8c06a;
    --rust:   #a63d2f;
    --teal:   #2a6b6e;
    --ink:    #1c1812;
    --muted:  #8a7e6e;
    --border: #ddd0b8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--ivory);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: sticky; top: 0; z-index: 200;
    background: rgba(28,24,18,0.97);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(200,151,42,0.18);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 3rem; height: 58px; gap: 1.5rem;
  }
  .nav-left { display: flex; align-items: center; gap: 1.5rem; }
  .back-link {
    font-family: 'Jost', sans-serif;
    font-size: 0.7rem; font-weight: 300;
    color: var(--muted); text-decoration: none;
    letter-spacing: 0.06em; display: flex; align-items: center; gap: 0.35rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold2); }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem; font-weight: 600;
    color: var(--gold2); letter-spacing: 0.08em;
    text-decoration: none;
  }
  .nav-brand span { color: var(--muted); font-weight: 300; }

  /* Cart button — top right */
  .nav-cart-btn {
    position: relative;
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.45rem 1.2rem;
    background: rgba(200,151,42,0.1);
    border: 1px solid rgba(200,151,42,0.35);
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem; font-weight: 400;
    color: #c8972a; text-decoration: none;
    letter-spacing: 0.05em;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap; flex-shrink: 0;
  }
  .nav-cart-btn:hover { background: rgba(200,151,42,0.2); border-color: rgba(200,151,42,0.6); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    min-width: 18px; height: 18px;
    background: var(--rust); color: #fff;
    border-radius: 999px; font-size: 0.6rem; font-weight: 500;
    display: none; align-items: center; justify-content: center;
    padding: 0 4px; line-height: 1;
    animation: popIn 0.25s cubic-bezier(.175,.885,.32,1.275) both;
  }
  .cart-badge.show { display: flex; }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    padding: 1rem 5rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem; font-weight: 300;
    color: var(--muted); letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    background: var(--ivory);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .breadcrumb a:hover { color: var(--gold); }
  .breadcrumb-sep { opacity: 0.4; }
  .breadcrumb-current { color: var(--ink); }

  /* ── PRODUCT LAYOUT ── */
  .product-page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 4rem 5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
  }

  /* ── LEFT: VISUAL ── */
  .product-visual { position: sticky; top: 78px; }

  .product-image-main {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 32px 64px rgba(28,24,18,0.18), 0 8px 24px rgba(28,24,18,0.1);
    margin-bottom: 1.25rem;
  }

  /* Woven texture overlay */
  .product-image-main::before {
    content: '';
    position: absolute; inset: 0; z-index: 1;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 10px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 10px);
  }

  .product-image-main::after {
    content: '';
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(160deg, rgba(255,255,255,0.15) 0%, transparent 45%, rgba(0,0,0,0.12) 100%);
  }

  .product-image-border-top,
  .product-image-border-bottom {
    position: absolute; left: 0; right: 0; height: 64px; z-index: 3;
    background: rgba(28,24,18,0.82);
    display: flex; align-items: center; justify-content: center;
  }
  .product-image-border-top { top: 0; }
  .product-image-border-bottom { bottom: 0; }

  .zari-pattern {
    display: flex; gap: 10px; align-items: center;
  }
  .zari-unit {
    width: 14px; height: 14px;
    border: 1px solid var(--gold); transform: rotate(45deg);
    opacity: 0.6; flex-shrink: 0;
  }
  .zari-unit.f { background: var(--gold); opacity: 0.4; }

  .product-center-motif {
    position: absolute; inset: 64px; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
  .shimmer { animation: shimmer 4s ease-in-out infinite; }

  /* Tag badges row */
  .product-tags-row {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
  }
  .ptag {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem; font-weight: 400;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--ivory);
  }
  .ptag.gold { border-color: rgba(200,151,42,0.4); color: var(--gold); background: rgba(200,151,42,0.06); }
  .ptag.teal { border-color: rgba(42,107,110,0.4); color: var(--teal); background: rgba(42,107,110,0.06); }

  /* ── RIGHT: INFO ── */
  .product-info-panel {}

  .product-eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem; font-weight: 300;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.6rem;
  }

  .product-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 300; line-height: 1.1;
    color: var(--ink); margin-bottom: 0.4rem;
  }
  .product-title em { font-style: italic; color: var(--rust); }

  .product-variant-label {
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem; font-weight: 300;
    color: var(--muted); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 1.5rem;
  }

  .product-price-block {
    display: flex; align-items: baseline; gap: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .product-price-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 600; color: var(--gold);
    line-height: 1;
  }
  .product-price-note {
    font-family: 'Jost', sans-serif;
    font-size: 0.68rem; font-weight: 300; color: var(--muted);
    letter-spacing: 0.04em;
  }
  .product-shipping-note {
    font-family: 'Jost', sans-serif;
    font-size: 0.7rem; font-weight: 300;
    color: var(--teal); margin-bottom: 2rem;
    letter-spacing: 0.04em;
  }

  /* Divider line */
  .info-divider {
    border: none; border-top: 1px solid var(--border); margin: 1.75rem 0;
  }

  /* Qty + Add to cart */
  .purchase-row {
    display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;
  }

  .qty-stepper {
    display: flex; align-items: center;
    border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 36px; height: 44px;
    background: var(--cream); border: none; cursor: pointer;
    font-size: 1rem; color: var(--ink);
    transition: background 0.15s; font-family: 'Jost', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-num {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Jost', sans-serif; font-size: 0.9rem;
    color: var(--ink); border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: var(--ivory);
  }

  .add-btn {
    flex: 1;
    padding: 0 1.5rem; height: 44px;
    background: var(--ink); color: var(--gold2);
    border: none; border-radius: 3px; cursor: pointer;
    font-family: 'Jost', sans-serif; font-size: 0.75rem;
    font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase;
    transition: background 0.2s, color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .add-btn:hover { background: var(--gold); color: var(--ink); }
  .add-btn.added { background: var(--teal); color: #fff; }

  .wishlist-btn {
    width: 44px; height: 44px;
    background: var(--ivory); border: 1px solid var(--border);
    border-radius: 3px; cursor: pointer; font-size: 1.1rem;
    transition: border-color 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .wishlist-btn:hover { border-color: var(--rust); background: rgba(166,61,47,0.05); }

  /* Info accordion sections */
  .info-accordion { border-top: 1px solid var(--border); }

  .accordion-item { border-bottom: 1px solid var(--border); }

  .accordion-header {
    width: 100%; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 0;
    font-family: 'Jost', sans-serif; font-size: 0.78rem;
    font-weight: 400; letter-spacing: 0.06em;
    color: var(--ink); text-align: left;
    transition: color 0.15s;
  }
  .accordion-header:hover { color: var(--gold); }
  .accordion-arrow {
    font-size: 0.7rem; color: var(--muted);
    transition: transform 0.25s;
  }
  .accordion-item.open .accordion-arrow { transform: rotate(180deg); }

  .accordion-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.25s;
    padding: 0;
  }
  .accordion-item.open .accordion-body {
    max-height: 600px;
    padding-bottom: 1.25rem;
  }

  .accordion-content {
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem; font-weight: 300;
    line-height: 1.85; color: #5a4e40;
  }

  .accordion-content p + p { margin-top: 0.85em; }

  .spec-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.25rem;
  }
  .spec-table tr { border-bottom: 1px solid rgba(221,208,184,0.5); }
  .spec-table tr:last-child { border-bottom: none; }
  .spec-table td {
    padding: 0.55rem 0;
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem; font-weight: 300;
    vertical-align: top;
    line-height: 1.5;
  }
  .spec-table td:first-child {
    color: var(--muted); width: 40%;
    font-size: 0.7rem; letter-spacing: 0.04em;
    text-transform: uppercase; padding-right: 1rem;
  }
  .spec-table td:last-child { color: var(--ink); }

  /* Weaver spotlight */
  .weaver-card {
    display: flex; gap: 1rem; align-items: flex-start;
    padding: 1.25rem;
    background: var(--cream);
    border-radius: 4px;
    border-left: 3px solid var(--gold);
    margin-top: 0.25rem;
  }
  .weaver-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 1.4rem;
    background: var(--ink);
  }
  .weaver-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 600; color: var(--ink);
    margin-bottom: 0.15rem;
  }
  .weaver-meta {
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem; font-weight: 300; color: var(--gold);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .weaver-bio {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.82rem; font-style: italic;
    color: var(--muted); line-height: 1.6;
  }

  /* Care icons */
  .care-icons {
    display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.25rem;
  }
  .care-item {
    display: flex; align-items: center; gap: 0.45rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.7rem; font-weight: 300; color: var(--muted);
    letter-spacing: 0.04em;
  }
  .care-icon { font-size: 1rem; }

  /* Sustainability tags */
  .eco-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
  .eco-tag {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid rgba(42,107,110,0.3);
    border-radius: 999px;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem; font-weight: 300;
    color: var(--teal); background: rgba(42,107,110,0.05);
    letter-spacing: 0.04em;
  }
  .eco-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); }

  /* ── RELATED PRODUCTS ── */
  .related-section {
    border-top: 1px solid var(--border);
    padding: 4rem 5rem 5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .related-eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.5rem;
  }
  .related-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 300; color: var(--ink);
    margin-bottom: 2rem;
  }
  .related-title em { font-style: italic; color: var(--rust); }

  .related-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
  }

  .related-card {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 3px; overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s, box-shadow 0.22s;
    text-decoration: none; color: inherit;
    display: block;
  }
  .related-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(28,24,18,0.1);
  }
  .related-thumb {
    height: 120px; position: relative; overflow: hidden;
  }
  .related-thumb::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
  }
  .related-info { padding: 0.85rem 1rem 1rem; }
  .related-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem; font-weight: 600; color: var(--ink);
    margin-bottom: 0.15rem;
  }
  .related-price {
    font-family: 'Jost', sans-serif;
    font-size: 0.7rem; font-weight: 300; color: var(--gold);
    letter-spacing: 0.04em;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: #1c1812;
    border: 1px solid rgba(200,151,42,0.35);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 0.85rem 1.25rem;
    display: flex; align-items: center; gap: 0.75rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 9999;
    transform: translateY(120%);
    transition: transform 0.35s cubic-bezier(.175,.885,.32,1.275);
    min-width: 260px; max-width: 340px;
  }
  .toast.show { transform: translateY(0); }
  .toast-icon { font-size: 1.1rem; flex-shrink: 0; }
  .toast-content { flex: 1; }
  .toast-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem; color: #e8c06a; margin-bottom: 0.15rem;
  }
  .toast-sub {
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem; font-weight: 300; color: #6a6050; letter-spacing: 0.04em;
  }
  .toast-link {
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem; color: #c8972a;
    text-decoration: none; border: 1px solid rgba(200,151,42,0.3);
    padding: 0.25rem 0.6rem; border-radius: 4px;
    transition: background 0.15s; white-space: nowrap; letter-spacing: 0.04em;
  }
  .toast-link:hover { background: rgba(200,151,42,0.1); }

  /* ── NOT FOUND ── */
  .not-found {
    text-align: center; padding: 8rem 2rem;
    font-family: 'Cormorant Garamond', serif;
  }
  .not-found h2 { font-size: 2rem; font-weight: 300; font-style: italic; color: var(--ink); margin-bottom: 1rem; }
  .not-found p { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }
  .not-found a {
    font-family: 'Jost', sans-serif; font-size: 0.72rem;
    padding: 0.7rem 2rem; background: var(--ink); color: var(--gold2);
    text-decoration: none; border-radius: 2px; letter-spacing: 0.1em; text-transform: uppercase;
  }

  @media (max-width: 900px) {
    .navbar { padding: 0 1.25rem; }
    .breadcrumb { padding: 0.75rem 1.5rem; }
    .product-page { grid-template-columns: 1fr; padding: 2rem 1.5rem; gap: 2.5rem; }
    .product-visual { position: static; }
    .related-section { padding: 3rem 1.5rem; }
    .related-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

//  CART HELPERS
// ════════════════════════════════════════════
function getCart() {
  try { return JSON.parse(localStorage.getItem('suvarna_cart') || '[]'); }
  catch { return []; }
}
function saveCart(c) { localStorage.setItem('suvarna_cart', JSON.stringify(c)); }

function updateCartBadge() {
  const total = getCart().reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  if (!badge) return;
  badge.textContent = total;
  total > 0 ? badge.classList.add('show') : badge.classList.remove('show');
}

let qty = 1;

function addToCart(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) return;
  const cart = getCart();
  const existing = cart.find(i => i.id === productId);
  if (existing) { existing.qty += qty; }
  else { cart.push({ ...product, qty }); }
  saveCart(cart);
  updateCartBadge();
  showToast(product.name, product.variant);
  // flash button
  const btn = document.getElementById('addBtn');
  if (btn) {
    btn.classList.add('added');
    btn.textContent = `✓ ${qty > 1 ? qty + ' × ' : ''}Added to Cart`;
    setTimeout(() => {
      btn.classList.remove('added');
      btn.textContent = '+ Add to Cart';
    }, 2000);
  }
}

let toastTimer;
function showToast(name, variant) {
  const t = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = name;
  document.getElementById('toastSub').textContent = variant + ' · Added to cart';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

  `;
}

function toggleAccordion(btn) {
  const item = btn.closest('.accordion-item');
  const isOpen = item.classList.contains('open');
  // Close all
  document.querySelectorAll('.accordion-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(10, qty + delta));
  document.getElementById('qtyDisplay').textContent = qty;
}

function wishlist(btn) {
  btn.textContent = btn.textContent === '♡' ? '♥' : '♡';
  btn.style.color = btn.textContent === '♥' ? 'var(--rust)' : '';
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const product = PRODUCTS.find(p => p.id === id);
  if (product) renderPage(product);
  else renderNotFound();
  updateCartBadge();
});
</script>
</body>
